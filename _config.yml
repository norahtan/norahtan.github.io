# ---------------------------------------------------------------------
# norahtan.github.io  ·  minimal Jekyll config
# ---------------------------------------------------------------------

title:       "Xinyu (Norah) Tan"
description: "PhD student at MIT Mathematics working on quantum information and quantum error correction."
url:         "https://norahtan.github.io"
baseurl:     ""

author:
  name:  "Xinyu (Norah) Tan"
  email: "norahtan@mit.edu"

# Build settings
markdown:    kramdown
encoding:    utf-8
timezone:    America/Los_Angeles

# Plugins (GitHub Pages-supported)
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

# Files & directories to exclude from the build
exclude:
  - README.md
  - LICENSE
  - CHANGELOG.md
  - CONTRIBUTING.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .DS_Store

# Don't generate posts/categories/tags pages
permalink: /:title/
